<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stellify – KI Karriere Copilot Schweiz</title>
  <meta name="description" content="Bewerbungen schreiben mit KI – Motivationsschreiben, Lebenslauf, Interview Coach und mehr. Für die Schweiz gemacht." />
  <meta name="theme-color" content="#000000" />

  <!-- Open Graph -->
  <meta property="og:title" content="Stellify – KI Karriere Copilot" />
  <meta property="og:description" content="Bewerbungen schreiben mit KI. Für die Schweiz gemacht." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://stellify.ch" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2310b981'/><text y='23' x='5' font-size='20' font-family='sans-serif' font-weight='bold' fill='white'>S</text></svg>" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; }
    #root { min-height: 100vh; }
    #loading {
      position: fixed; inset: 0; background: #000;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #loading.hide { opacity: 0; pointer-events: none; }
    .load-logo {
      font-size: 28px; font-weight: 800; color: white;
      font-family: system-ui, sans-serif; letter-spacing: -1px;
      display: flex; align-items: center; gap: 6px;
    }
    .load-dot {
      width: 8px; height: 8px; background: #10b981;
      border-radius: 50%; margin-bottom: 10px;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .load-bar {
      width: 120px; height: 2px; background: rgba(255,255,255,.1);
      border-radius: 2px; overflow: hidden;
    }
    .load-fill {
      height: 100%; background: #10b981; border-radius: 2px;
      animation: fill 1.5s ease forwards;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes fill { from{width:0} to{width:100%} }
  </style>
</head>
<body>
  <!-- Ladescreen -->
  <div id="loading">
    <div class="load-logo">
      Stellify<div class="load-dot"></div>
    </div>
    <div class="load-bar"><div class="load-fill"></div></div>
  </div>

  <div id="root"></div>

  <!-- React + Babel (für JSX direkt im Browser) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Deine App -->
  <script type="text/babel" data-type="module" src="./stellify-v14.jsx"></script>

  <script>
    // Ladescreen ausblenden sobald App bereit
    window.addEventListener('load', () => {
      setTimeout(() => {
        const el = document.getElementById('loading');
        if (el) {
          el.classList.add('hide');
          setTimeout(() => el.remove(), 400);
        }
      }, 800);
    });
  </script>
</body>
</html>
