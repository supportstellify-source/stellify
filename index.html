<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Stellify – AI Career Copilot Schweiz. 20+ Tools für Bewerbung, LinkedIn, ATS, Zeugnis, Lehrstellensuche und Jobwechsel."/>
  <meta name="theme-color" content="#2563EB"/>
  <meta property="og:title" content="Stellify – AI Career Copilot Schweiz"/>
  <meta property="og:description" content="20+ KI-Tools für deine Karriere. Schweizer Standard. Jederzeit kündbar."/>
  <meta property="og:type" content="website"/>
  <title>Stellify – AI Career Copilot Schweiz</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x2726;</text></svg>"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#FAFAF8;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',system-ui,sans-serif}
    #root{min-height:100vh}
    #sl{position:fixed;inset:0;background:#FAFAF8;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .5s ease}
    #sl::before{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(37,99,235,.055) 1px,transparent 1px);background-size:28px 28px;pointer-events:none}
    #sl .ic{width:72px;height:72px;background:linear-gradient(135deg,#2563EB,#1D4ED8);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:34px;box-shadow:0 8px 32px rgba(37,99,235,.28);margin-bottom:22px;animation:lp 2.2s ease-in-out infinite}
    #sl .nm{color:#1A1A18;font-size:34px;font-weight:300;letter-spacing:-1px;margin-bottom:5px;font-family:Georgia,serif}
    #sl .sb{color:#5C5C58;font-size:12px;letter-spacing:.06em;margin-bottom:26px}
    #sl .dt{display:flex;gap:7px}
    #sl .dt span{width:6px;height:6px;border-radius:50%;background:#2563EB;opacity:.25;animation:ld 1.2s ease-in-out infinite}
    #sl .dt span:nth-child(2){animation-delay:.2s}
    #sl .dt span:nth-child(3){animation-delay:.4s}
    #sl .pb{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(37,99,235,.08);overflow:hidden}
    #sl .pf{height:100%;background:linear-gradient(90deg,#2563EB,#818CF8);animation:pr 2.8s cubic-bezier(.4,0,.2,1) forwards}
    @keyframes lp{0%,100%{transform:scale(.92);opacity:.65}50%{transform:scale(1.05);opacity:1}}
    @keyframes ld{0%,80%,100%{transform:scale(.4);opacity:.2}40%{transform:scale(1);opacity:.9}}
    @keyframes pr{from{width:0}to{width:100%}}
  </style>
</head>
<body>
  <div id="sl">
    <div class="ic">&#x2726;</div>
    <div class="nm">Stellify</div>
    <div class="sb">AI Career Copilot &middot; &#x1F1E8;&#x1F1ED; Schweiz</div>
    <div class="dt"><span></span><span></span><span></span></div>
    <div class="pb"><div class="pf"></div></div>
  </div>
  <div id="root"></div>
  <script>
    function hideSL() {
      var el = document.getElementById("sl");
      if (el) { el.style.opacity = "0"; setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 500); }
    }
    setTimeout(hideSL, 3500);
    window.onerror = function(msg, src, line, col, err) {
      var el = document.getElementById("sl");
      if (el) {
        el.innerHTML = "<div style=\"color:#1A1A18;padding:28px;text-align:center;font-family:system-ui;max-width:480px\"><div style=\"font-size:32px;margin-bottom:12px\">&#9888;&#xFE0F;</div><b style=\"font-size:15px\">Fehler beim Laden</b><br><br><span style=\"font-size:12px;color:#5C5C58\">" + msg + "</span><br><br><button onclick=\"location.reload()\" style=\"background:#2563EB;color:white;border:none;padding:10px 24px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500\">&#x21bb; Neu laden</button></div>";
        el.style.background = "#FAFAF8";
        el.style.opacity = "1";
      }
      return false;
    };
    window.addEventListener("unhandledrejection", function(e) { window.onerror(String(e.reason)); });
  </script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="./stellify-bundle.js"></script>
</body>
</html>
