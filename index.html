<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Stellify – AI Career Copilot Schweiz. 20+ KI-Tools für Bewerbungen, LinkedIn und mehr."/>
  <meta name="theme-color" content="#10b981"/>
  <title>Stellify – AI Career Copilot Schweiz</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x2726;</text></svg>"/>
  <link rel="preconnect" href="https://api.groq.com" crossorigin/>
  <link rel="dns-prefetch" href="https://api.groq.com"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px}
    body{background:#07070e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    #root{min-height:100vh}
    #sl{position:fixed;inset:0;background:#07070e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:99999;transition:opacity .5s ease}
    #sl.out{opacity:0;pointer-events:none}
    .sl-ic{font-size:48px;animation:slp 2s ease-in-out infinite}
    .sl-nm{color:#fff;font-size:22px;font-weight:700;letter-spacing:-.5px}
    .sl-dt{display:flex;gap:8px}
    .sl-dt span{width:7px;height:7px;border-radius:50%;background:#10b981;animation:sld 1.2s ease-in-out infinite}
    .sl-dt span:nth-child(2){animation-delay:.18s}
    .sl-dt span:nth-child(3){animation-delay:.36s}
    .sl-sb{color:rgba(255,255,255,.35);font-size:11px;letter-spacing:.3px}
    @keyframes slp{0%,100%{transform:scale(.85);opacity:.45}50%{transform:scale(1.05);opacity:1}}
    @keyframes sld{0%,80%,100%{transform:scale(.35);opacity:.2}40%{transform:scale(1);opacity:1}}
  </style>
</head>
<body>
  <div id="sl">
    <div class="sl-ic">&#x2726;</div>
    <div class="sl-nm">Stellify</div>
    <div class="sl-dt"><span></span><span></span><span></span></div>
    <div class="sl-sb">AI Career Copilot Schweiz</div>
  </div>
  <div id="root"></div>
  <script>
    // Hide loader - called by React on mount
    window._hsl = function(){
      var el = document.getElementById("sl");
      if(el){el.classList.add("out");setTimeout(function(){el&&el.parentNode&&el.parentNode.removeChild(el)},520);}
    };
    // Auto-hide after 4s fallback
    setTimeout(function(){window._hsl&&window._hsl()},4000);
    // Show error if JS crashes
    window.onerror = function(msg){
      var el=document.getElementById("sl");
      if(el){el.innerHTML='<div style="color:#ef4444;padding:24px;text-align:center;max-width:400px"><b>Fehler beim Laden</b><br><br><span style="font-size:13px;opacity:.7">'+msg+'</span><br><br><button onclick="location.reload()" style="margin-top:16px;background:#10b981;color:#fff;border:none;padding:10px 28px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600">Neu laden</button></div>';el.style.opacity="1";}
    };
  </script>
  <script src="./stellify-bundle-v2.js"></script>
</body>
</html>
